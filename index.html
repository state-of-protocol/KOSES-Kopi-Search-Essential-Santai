<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPI-SEARCH // SOVEREIGN</title>
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/form-card.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="nav-container"></div>

    <main class="container">
        <div id="hero-container"></div>
        <div id="search-container"></div>
        <div id="weather-container"></div>

        <div id="results" style="display: none; margin-top: 60px;">
            <div id="audit-container"></div>
            <div id="results-grid"></div>
        </div>
    </main>

    <button class="theme-btn" onclick="toggleTheme()" title="Switch Visual Protocol">☕</button>

    <script type="module" src="js/main.js"></script>

    <script>
        /**
         * KOSES COMPONENT LOADER
         * Memuatkan fail HTML luaran ke dalam ID yang ditentukan.
         */
        async function loadComponent(id, file) {
            try {
                const response = await fetch(`components/${file}`);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const data = await response.text();
                document.getElementById(id).innerHTML = data;
            } catch (error) {
                console.error(`Gagal memuatkan komponen [${file}]:`, error);
                document.getElementById(id).innerHTML = `<div style="color:#ff5555; font-size:10px; padding:10px;">> ERROR_LOADING_NODE: ${file}</div>`;
            }
        }

        // Jalankan loading semua komponen serentak sebaik sahaja tetingkap dimuatkan
        window.onload = async () => {
            console.log("KOPI_SEARCH: Initiating component sync...");
            
            await Promise.all([
                loadComponent('nav-container', 'navbar.html'),
                loadComponent('hero-container', 'hero.html'),
                loadComponent('search-container', 'search.html'),
                loadComponent('weather-container', 'weather.html'),
                loadComponent('audit-container', 'audit.html')
            ]);

            console.log("KOPI_SEARCH: Architecture fully synchronized.");
            
            // Dispatch event khas untuk memberitahu main.js bahawa UI sudah sedia
            window.dispatchEvent(new Event('componentsLoaded'));
        };
    </script>
</body>
</html>
