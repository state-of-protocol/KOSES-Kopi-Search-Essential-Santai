<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOPI-SEARCH // SOVEREIGN</title>
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/form-card.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="nav-container"></div>

    <main class="container">
        <div id="hero-container"></div>
        <div id="search-container"></div>
        <div id="weather-container"></div>

        <div id="results" style="display: none; margin-top: 60px;">
            <div id="audit-container"></div>
            <div id="results-grid"></div>
        </div>
    </main>

    <button class="theme-btn" onclick="toggleTheme()" title="Switch Visual Protocol">☕</button>

    <script src="script.js"></script>
    <script>
        /**
         * KOSES COMPONENT LOADER
         * Memuatkan fail HTML luaran ke dalam kontena yang ditetapkan.
         */
        async function loadComponent(id, file) {
            try {
                const response = await fetch(`components/${file}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.text();
                document.getElementById(id).innerHTML = data;
            } catch (error) {
                console.error(`Gagal memuatkan komponen [${file}]:`, error);
                document.getElementById(id).innerHTML = `<p style="color:red; font-size:10px;">ERROR_LOADING_COMPONENT: ${file}</p>`;
            }
        }

        // Jalankan loading semua komponen sebaik sahaja tetingkap dimuatkan
        window.onload = async () => {
            // Menggunakan Promise.all untuk kelajuan loading serentak
            await Promise.all([
                loadComponent('nav-container', 'navbar.html'),
                loadComponent('hero-container', 'hero.html'),
                loadComponent('search-container', 'search.html'),
                loadComponent('weather-container', 'weather.html'),
                loadComponent('audit-container', 'audit.html')
            ]);

            // Inisialisasi fungsi JS tambahan jika perlu selepas komponen wujud
            console.log("KOPI_SEARCH: All components synchronized.");
        };
    </script>
</body>
</html>
