    <!-- Component Loader -->
    <script>
        /**
         * KOSES COMPONENT LOADER
         * Memuatkan fail HTML luaran ke dalam ID yang ditentukan.
         * Optimized for performance with error handling and logging.
         */
        async function loadComponent(id, file) {
            const element = document.getElementById(id);
            if (!element) {
                console.warn(`Component container not found: ${id}`);
                return;
            }

            try {
                const response = await fetch(`components/${file}`, {
                    method: 'GET',
                    headers: { 'Accept': 'text/html' }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status} ${response.statusText}`);
                }
                
                const data = await response.text();
                element.innerHTML = data;
                console.log(`✓ Component loaded: ${file}`);
            } catch (error) {
                console.error(`✗ Failed to load component [${file}]:`, error);
                element.innerHTML = `
                    <div style="color:#ff5555; font-size:10px; padding:10px; border:1px solid #ff5555; border-radius:4px;">
                        > ERROR_LOADING_COMPONENT: ${file}
                        <br>> ${error.message}
                    </div>
                `;
            }
        }

        // Initialize components when window loads
        window.addEventListener('load', async () => {
            console.log("🍵 KOPI_SEARCH: Initiating component synchronization...");
            
            try {
                await Promise.all([
                    loadComponent('nav-container', 'navbar.html'),
                    loadComponent('hero-container', 'hero.html'),
                    loadComponent('search-container', 'search.html'),
                    loadComponent('weather-container', 'weather.html'),
                    loadComponent('audit-container', 'audit.html')
                ]);

                console.log("✓ KOPI_SEARCH: Architecture fully synchronized.");
                window.dispatchEvent(new CustomEvent('componentsLoaded', { detail: { timestamp: Date.now() } }));
            } catch (error) {
                console.error("✗ Component synchronization failed:", error);
            }
        }, { once: true });

        // Performance monitoring
        if ('PerformanceObserver' in window) {
            try {
                const observer = new PerformanceObserver((list) => {
                    for (const entry of list.getEntries()) {
                        console.log(`⏱️  ${entry.name}: ${entry.duration.toFixed(2)}ms`);
                    }
                });
                observer.observe({ entryTypes: ['measure', 'navigation'] });
            } catch (e) {
                console.log('Performance monitoring not available');
            }
        }
    </script>
